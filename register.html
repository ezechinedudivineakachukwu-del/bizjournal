<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - BizJournal</title>
  <link rel="icon" type="image/png" href="./Modern bizjournal logo design.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --cyan: #06B6D4;
      --cyan-dark: #0891B2;
      --gold: #FBBF24;
      --purple: #A855F7;
      --coral: #FB7185;
      --dark: #0F172A;
      --darker: #111827;
      --darkest: #1A1F47;
      --surface: #1E293B;
      --text: #FFFFFF;
      --text-muted: rgba(255,255,255,0.6);
      --text-hint: rgba(255,255,255,0.3);
    }
    
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, var(--dark) 0%, var(--darker) 50%, var(--darkest) 100%);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    
    .register-container {
      width: 100%;
      max-width: 450px;
    }
    
    .register-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .register-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    
    .register-logo-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 18px;
      color: white;
    }
    
    .register-logo-text {
      font-weight: 800;
      font-size: 20px;
      background: linear-gradient(90deg, var(--cyan), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .register-title {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 0.5rem;
    }
    
    .register-subtitle {
      color: var(--text-muted);
      font-size: 14px;
    }
    
    /* FORM */
    .register-form {
      background: linear-gradient(135deg, rgba(30, 41, 59, 0.5), rgba(26, 31, 71, 0.3));
      border: 1px solid rgba(6, 182, 212, 0.1);
      border-radius: 16px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    
    .form-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    
    input[type="text"],
    input[type="email"],
    input[type="password"],
    select {
      width: 100%;
      background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), rgba(26, 31, 71, 0.6));
      border: 1px solid rgba(6, 182, 212, 0.1);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      transition: all 0.3s ease;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
    }
    
    select option {
      background: #111827;
      color: var(--text);
    }
    
    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus,
    select:focus {
      outline: none;
      border-color: var(--cyan);
      background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), rgba(26, 31, 71, 0.5));
      box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
    }
    
    input::placeholder {
      color: var(--text-hint);
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    
    .terms {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      font-size: 12px;
      color: var(--text-muted);
    }
    
    .terms input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--cyan);
      margin-top: 2px;
      flex-shrink: 0;
    }
    
    .terms a {
      color: var(--cyan);
      text-decoration: none;
    }
    
    .terms a:hover {
      text-decoration: underline;
    }
    
    .btn-register {
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
    }
    
    .btn-register:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(6, 182, 212, 0.4);
    }
    
    .register-footer {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-muted);
      font-size: 13px;
    }
    
    .register-footer a {
      color: var(--cyan);
      text-decoration: none;
      font-weight: 600;
    }
    
    .register-footer a:hover {
      text-decoration: underline;
    }
    
    /* RESPONSIVE */
    @media (max-width: 768px) {
      .register-container {
        padding: 1rem;
      }
      
      .register-form {
        padding: 1.5rem;
      }
      
      .register-header {
        margin-bottom: 1.5rem;
      }
      
      .register-title {
        font-size: 22px;
      }
      
      .form-row {
        grid-template-columns: 1fr;
        gap: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="register-container">
    <div class="register-header">
      <div class="register-logo">
        <div class="register-logo-icon">BJ</div>
        <div class="register-logo-text">BizJournal</div>
      </div>
      <h1 class="register-title">Start Free</h1>
      <p class="register-subtitle">Create your account and start journaling today</p>
    </div>

    <form class="register-form" onsubmit="handleRegister(event)">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input type="text" placeholder="John" required>
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" placeholder="Doe" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label class="form-label">User Type</label>
        <select required>
          <option value="">Select...</option>
          <option value="business">Business Owner</option>
          <option value="executive">Executive</option>
          <option value="founder">Founder</option>
          <option value="professional">Professional</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" placeholder="••••••••" required>
      </div>

      <div class="terms">
        <input type="checkbox" id="terms" required>
        <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
      </div>

      <button type="submit" class="btn-register">Create Account</button>
    </form>

    <div class="register-footer">
      Already have an account? <a href="login.html">Sign in</a><br><br>
      <a href="index.html">← Back to home</a>
    </div>
  </div>

  <script>
    function handleRegister(event) {
      event.preventDefault();
      // In a real app, you would validate and submit to your backend
      localStorage.setItem('user', JSON.stringify({ name: 'New User', email: 'user@bizjournal.com' }));
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
